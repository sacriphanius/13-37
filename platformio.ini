; 13:37 — firmware for the LILYGO T-Watch Ultra
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = twatch_ultra
boards_dir = ./boards

[env:twatch_ultra]
framework = arduino
platform = espressif32@6.10.0
board = lilygo-t-watch-ultra
upload_speed = 921600
monitor_speed = 115200
board_build.filesystem = fatfs

build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_T_WATCH_S3_ULTRA
    -I variants/lilygo_twatch_ultra

    ; Trim unused RadioLib modules to reduce flash usage
    -D RADIOLIB_EXCLUDE_RF69
    -D RADIOLIB_EXCLUDE_SX1231
    -D RADIOLIB_EXCLUDE_RFM2X
    -D RADIOLIB_EXCLUDE_SX127X
    -D RADIOLIB_EXCLUDE_AFSK
    -D RADIOLIB_EXCLUDE_AX25
    -D RADIOLIB_EXCLUDE_HELLSCHREIBER
    -D RADIOLIB_EXCLUDE_MORSE
    -D RADIOLIB_EXCLUDE_RTTY
    -D RADIOLIB_EXCLUDE_SSTV
    -D RADIOLIB_EXCLUDE_DIRECT_RECEIVE
    -D RADIOLIB_EXCLUDE_APRS
    -D RADIOLIB_EXCLUDE_BELL

    ; Change to match your installed radio module:
    ;   ARDUINO_LILYGO_LORA_SX1262  (Sub-1G LoRa, default)
    ;   ARDUINO_LILYGO_LORA_SX1280  (2.4G LoRa)
    ;   ARDUINO_LILYGO_LORA_CC1101
    ;   ARDUINO_LILYGO_LORA_LR1121
    ;   ARDUINO_LILYGO_LORA_SI4432
    -D ARDUINO_LILYGO_LORA_SX1262

    -Wnarrowing

monitor_filters =
    default
    esp32_exception_decoder

; Auto-applies the LilyGoLib SEND_BUF_SIZE fix after libs are fetched so a fresh
; checkout (or `pio run -t clean`) builds correctly. See scripts/patch_lilygolib.py.
extra_scripts = pre:scripts/patch_lilygolib.py

; Dependencies pinned to exact versions / commits for reproducible release
; builds (resolved from the previously-working ranges). Bump deliberately.
lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGoLib#b3df890
    lvgl/lvgl @ 9.5.0
    jgromes/RadioLib @ 7.6.0
    lewisxhe/XPowersLib @ 0.3.3
    lewisxhe/SensorLib @ 0.3.4
    mikalhart/TinyGPSPlus @ 1.1.0
    https://github.com/lewisxhe/ST25R3916-fork.git#0c8e00f
    https://github.com/lewisxhe/NFC-RFAL-fork.git#7bde458
